# Jerome7 — ZeroClaw Skill Configuration
# Daily 7-minute AI-generated movement sessions
# Install: copy to your ZeroClaw skills directory

[skill]
name = "jerome7"
description = "Daily 7-minute movement session. AI-generated. Same for everyone. Streak-powered."
version = "2.0.0"
author = "omar"

[skill.config]
base_url = "https://jerome7.com"
timer_url = "https://jerome7.com/timer"
leaderboard_url = "https://jerome7.com/leaderboard"
github = "https://github.com/odominguez7/Jerome7"
discord = "https://discord.gg/5AZP8DbEJm"

[[tools]]
name = "jerome7_daily"
type = "http_request"
description = "Get today's 7-minute session (same for everyone on earth)"

[tools.request]
method = "GET"
url = "https://jerome7.com/daily"

[tools.request.headers]
Accept = "application/json"

[[tools]]
name = "jerome7_pledge"
type = "http_request"
description = "Register a new user — starts their chain"

[tools.request]
method = "POST"
url = "https://jerome7.com/pledge"

[tools.request.headers]
Content-Type = "application/json"
Accept = "application/json"

[tools.request.body]
name = "{{name}}"
timezone = "{{timezone}}"

[[tools.parameters]]
name = "name"
type = "string"
required = true
description = "User's name"

[[tools.parameters]]
name = "timezone"
type = "string"
required = false
description = "User's timezone (e.g. America/New_York)"

[[tools]]
name = "jerome7_log"
type = "http_request"
description = "Log a completed session — updates streak"

[tools.request]
method = "POST"
url = "https://jerome7.com/log/{{user_id}}"

[tools.request.headers]
Content-Type = "application/json"

[tools.request.body]
duration_minutes = 7

[[tools.parameters]]
name = "user_id"
type = "string"
required = true
description = "The user's Jerome7 ID"

[[tools]]
name = "jerome7_streak"
type = "http_request"
description = "Get a user's current streak, longest streak, and chain"

[tools.request]
method = "GET"
url = "https://jerome7.com/streak/{{user_id}}"

[tools.request.headers]
Accept = "application/json"

[[tools.parameters]]
name = "user_id"
type = "string"
required = true
description = "The user's Jerome7 ID"

[[tools]]
name = "jerome7_leaderboard"
type = "http_request"
description = "Global leaderboard — who's showing up worldwide"

[tools.request]
method = "GET"
url = "https://jerome7.com/leaderboard/data"

[tools.request.headers]
Accept = "application/json"

[[tools]]
name = "jerome7_feedback"
type = "http_request"
description = "Submit difficulty feedback after a session (1=easy, 3=good, 5=hard)"

[tools.request]
method = "POST"
url = "https://jerome7.com/log/{{user_id}}/feedback"

[tools.request.headers]
Content-Type = "application/json"

[tools.request.body]
difficulty = "{{difficulty}}"

[[tools.parameters]]
name = "user_id"
type = "string"
required = true
description = "The user's Jerome7 ID"

[[tools.parameters]]
name = "difficulty"
type = "integer"
required = true
description = "Difficulty rating: 1=easy, 3=good, 5=hard"
