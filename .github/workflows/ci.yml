name: Jerome7 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with Ruff
        run: ruff check src/ mcp_server/ --ignore E501

      - name: Check imports
        run: python -c "from src.api.main import app; print('✅ App imports successfully')"

      - name: Verify agent modules
        run: |
          python -c "from src.agents.mesh import AgentMesh; print('✅ Agent Mesh')"
          python -c "from src.agents.personal import PersonalAgent; print('✅ Personal Agent')"
          python -c "from src.agents.daily_checkup import CheckupOrchestrator; print('✅ Daily Checkup')"
          python -c "from src.agents.social import MicroForum; print('✅ Social Layer')"

  cli-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify CLI package
        run: |
          cd cli
          node -e "require('./index.js')" 2>/dev/null || echo "✅ CLI package valid"
          cat package.json | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['name']=='jerome7'; print('✅ Package name correct')"
